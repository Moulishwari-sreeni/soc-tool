<!DOCTYPE html>
<html>
<head>
    <title>Tomato SOC Login</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #050b1a;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .login-box {
            background: rgba(20, 25, 40, 0.95);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0,255,150,0.2);
            width: 320px;
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #00ffaa;
        }

        p {
            font-size: 12px;
            color: #888;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            outline: none;
            border-radius: 6px;
            background: #0f172a;
            color: white;
        }

        input:focus {
            box-shadow: 0 0 8px #00ffaa;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: none;
            border-radius: 6px;
            background: #00ffaa;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #00cc88;
        }

        .error {
            color: red;
            font-size: 13px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>🔐 Tomato SOC</h2>
    <p>Authorized Access Only</p>

    {% if error %}
    <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
